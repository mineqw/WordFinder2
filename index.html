<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>جستجوی کلمات فارسی</title>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    padding:20px;
    background:#f4f6f9;
    font-family:Tahoma,sans-serif;
}

.container{
    max-width:1100px;
    margin:auto;
    background:#fff;
    padding:25px;
    border-radius:15px;
    box-shadow:0 4px 20px rgba(0,0,0,.08);
}

h1{
    text-align:center;
    color:#1565c0;
    margin-bottom:25px;
}

.toolbar{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-bottom:15px;
}

input,
select{
    padding:10px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
}

input{
    flex:1;
    min-width:250px;
}

select{
    min-width:180px;
    background:white;
    cursor:pointer;
}

button{
    border:none;
    background:#1565c0;
    color:white;
    padding:10px 18px;
    border-radius:8px;
    cursor:pointer;
    font-size:15px;
}

button:hover{
    opacity:.9;
}

.file-name{
    margin-bottom:15px;
    color:#555;
}

.stats{
    background:#e3f2fd;
    border-radius:8px;
    padding:12px;
    text-align:center;
    margin-bottom:15px;
    font-size:18px;
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#1565c0;
    color:white;
}

th,
td{
    border:1px solid #ddd;
    padding:8px;
    text-align:center;
}

tr:nth-child(even){
    background:#f8fafc;
}

.no-result{
    text-align:center;
    padding:20px;
    font-size:18px;
    color:#d32f2f;
}

</style>

</head>

<body>

<div class="container">

    <h1>جستجوی کلمات</h1>

    <div class="toolbar">

        <input
            id="letters"
            type="text"
            placeholder="حروف را وارد کنید ...">

        <select id="minLen">

            <option value="1">همه کلمات</option>
            <option value="2">حداقل 2 حرف</option>
            <option value="3">حداقل 3 حرف</option>
            <option value="4">حداقل 4 حرف</option>
            <option value="5">حداقل 5 حرف</option>
            <option value="6">حداقل 6 حرف</option>
            <option value="7">حداقل 7 حرف</option>
            <option value="8">حداقل 8 حرف</option>
            <option value="9">حداقل 9 حرف</option>
            <option value="10">حداقل 10 حرف</option>

        </select>

        <button id="pickFile">
            انتخاب فایل
        </button>

    </div>

    <div id="fileName" class="file-name">
        هنوز فایلی انتخاب نشده است
    </div>

    <div id="result"></div>

</div>

<script>

let fileText = "";

function normalizeText(text){

    return text
        .replace(/ي/g,"ی")
        .replace(/ك/g,"ک")
        .replace(/\u200c/g,"")
        .trim();

}

async function openFile(){

    try{

        const [handle] =
        await window.showOpenFilePicker({

            types:[
                {
                    description:"Text Files",
                    accept:{
                        "text/plain":[".txt"]
                    }
                }
            ]

        });

        const file =
        await handle.getFile();

        fileText =
        normalizeText(
            await file.text()
        );

        document
        .getElementById("fileName")
        .textContent =
        "فایل انتخاب شده: " +
        file.name;

        runSearch();

    }

    catch(err){

        console.log(err);

    }

}

function countLetters(text){

    const counter = {};

    const letters =
    text.match(/[\p{L}\p{N}]/gu) || [];

    for(const ch of letters){

        const c =
        ch.toLowerCase();

        counter[c] =
        (counter[c] || 0) + 1;

    }

    return counter;

}

function tokenize(text){

    return normalizeText(text)

    .replace(
        /[^\p{L}\p{N}\s]/gu,
        " "
    )

    .split(/\s+/)
    .filter(Boolean);

}

function onlyAllowed(words,allowed){

    const result = [];

    for(const word of words){

        const w =
        normalizeText(
            word.toLowerCase()
        );

        let valid = true;

        const counts = {};

        for(const ch of w){

            if(!(ch in allowed)){

                valid = false;
                break;

            }

            counts[ch] =
            (counts[ch] || 0) + 1;

            if(
                counts[ch] >
                allowed[ch]
            ){

                valid = false;
                break;

            }

        }

        if(valid)
            result.push(word);

    }

    return [...new Set(result)];

}

function groupByLength(words){

    const groups = {};

    for(const word of words){

        const len =
        word.length;

        if(!groups[len])
            groups[len] = [];

        groups[len].push(word);

    }

    return groups;

}

function buildTable(groups){

    const lengths =
    Object.keys(groups)
    .map(Number)
    .sort((a,b)=>a-b);

    if(lengths.length === 0){

        return `
            <div class="no-result">
                هیچ کلمه‌ای پیدا نشد
            </div>
        `;

    }

    let maxRows = 0;

    lengths.forEach(len=>{

        maxRows =
        Math.max(
            maxRows,
            groups[len].length
        );

    });

    let html = "";

    html += "<table>";

    html += "<tr>";
    html += "<th>ردیف</th>";

    lengths.forEach(len=>{

        html += `<th>${len}</th>`;

    });

    html += "</tr>";

    for(let i=0;i<maxRows;i++){

        html += "<tr>";

        html +=
        `<td>${i+1}</td>`;

        lengths.forEach(len=>{

            html += `
            <td>
                ${groups[len][i] || ""}
            </td>`;

        });

        html += "</tr>";

    }

    html += "</table>";

    return html;

}

function runSearch(){

    if(!fileText)
        return;

    const letters =
    normalizeText(
        document
        .getElementById("letters")
        .value
    );

    if(!letters){

        document
        .getElementById("result")
        .innerHTML = "";

        return;

    }

    const minLen =
    parseInt(
        document
        .getElementById("minLen")
        .value
    );

    const allowed =
    countLetters(letters);

    const words =
    tokenize(fileText);

    const filtered =
    onlyAllowed(
        words,
        allowed
    )

    .filter(
        w => w.length >= minLen
    );

    const groups =
    groupByLength(filtered);

    document
    .getElementById("result")
    .innerHTML =

    `
    <div class="stats">
        تعداد کلمات یافت شده:
        <b>${filtered.length}</b>
    </div>
    `

    +

    buildTable(groups);

}

document
.getElementById("pickFile")
.addEventListener(
    "click",
    openFile
);

document
.getElementById("letters")
.addEventListener(
    "input",
    runSearch
);

document
.getElementById("minLen")
.addEventListener(
    "change",
    runSearch
);

</script>

</body>
</html>
