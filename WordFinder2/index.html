<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>جستجوی کلمات</title>

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#1565c0">

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="container">

    <h1>جستجوی کلمات</h1>

    <div class="toolbar">

        <input
            id="letters"
            type="text"
            placeholder="حروف را وارد کنید">

        <select id="minLen">

            <option value="1">همه کلمات</option>
            <option value="2">حداقل 2 حرف</option>
            <option value="3">حداقل 3 حرف</option>
            <option value="4">حداقل 4 حرف</option>
            <option value="5">حداقل 5 حرف</option>
            <option value="6">حداقل 6 حرف</option>
            <option value="7">حداقل 7 حرف</option>
            <option value="8">حداقل 8 حرف</option>
            <option value="9">حداقل 9 حرف</option>
            <option value="10">حداقل 10 حرف</option>

        </select>

        <button id="pickFile">
            انتخاب فایل شخصی
        </button>

    </div>

    <div id="fileName" class="file-name">
        در حال بارگذاری واژگان...
    </div>

    <div id="dropZone" class="drop-zone">

        فایل txt را اینجا رها کنید

        <div class="drop-sub">
            یا از دکمه انتخاب فایل استفاده کنید
        </div>

    </div>

    <div id="result"></div>

</div>

<script src="js/app.js"></script>

<script>

if("serviceWorker" in navigator){

    window.addEventListener("load",()=>{

        navigator.serviceWorker.register(
            "./sw.js"
        );

    });

}

</script>

</body>

</html>
